<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Altered Re:Union – Auth test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 4rem auto; padding: 2rem; background: #0e1525; color: #e2e8f0; border-radius: 16px; border: 1px solid #1e2d45; }
    h1 { margin-top: 0; color: #00c2d4; }
    button { padding: 0.7rem 1.2rem; margin-right: 0.5rem; background: #00c2d4; color: #080c17; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
    button:hover { opacity: 0.9; }
    pre { background: #080c17; padding: 1rem; border-radius: 8px; overflow-x: auto; font-size: 0.85rem; border: 1px solid #1e2d45; }
    .status { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-weight: 500; }
    .status.authenticated { background: rgba(74, 222, 128, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); }
    .status.anonymous { background: rgba(248, 113, 113, 0.15); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); }
  </style>
</head>
<body>
  <h1>Keycloak Auth Test</h1>

  <div id="status" class="status anonymous">Not authenticated</div>

  <div>
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
    <button id="logoutBtn">Logout</button>
    <button id="accountBtn">Account</button>
    <button id="refreshBtn">Refresh token</button>
  </div>

  <h3 style="margin-top:2rem;">User info</h3>
  <pre id="userInfo">—</pre>

  <h3>ID token (decoded)</h3>
  <pre id="idToken">—</pre>

  <h3>Access token (decoded)</h3>
  <pre id="accessToken">—</pre>

  <script type="module" src="app.js"></script>
</body>
</html>
